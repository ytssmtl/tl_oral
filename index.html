<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>华文口试 · 全屏按钮绝对消失</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', 'Space Mono', 'Courier New', monospace;
            font-weight: 300;
            background: linear-gradient(145deg, #0c1129 0%, #1a2340 30%, #121b2c 80%, #0b0f23 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e6ff;
            position: relative;
            overflow-x: hidden;
        }

        /* 网格纹理 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 220, 200, 0.02) 25%, rgba(0, 220, 200, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 220, 200, 0.02) 75%, rgba(0, 220, 200, 0.02) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 220, 200, 0.02) 25%, rgba(0, 220, 200, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 220, 200, 0.02) 75%, rgba(0, 220, 200, 0.02) 76%, transparent 77%, transparent);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridShift 30s linear infinite;
            opacity: 0.5;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 30%, rgba(0, 180, 255, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 90% 70%, rgba(0, 240, 200, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .main-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            position: relative;
            z-index: 2;
            margin: 0 auto;
        }

        .header-section {
            position: relative;
            width: 100%;
            text-align: center;
            margin-bottom: 0;
        }
        .platform-title, .platform-subtitle { display: none; }

        /* ----- 图片 + 左右箭头容器 ----- */
        .image-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            position: relative;
        }

        /* 纯三角箭头 - 完全保持之前的样子 */
        .side-arrow {
            width: 80px;
            height: 160px;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            position: relative;
            font-size: 0;
            padding: 0;
        }

        .side-arrow:hover {
            transform: scale(1.2);
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .side-arrow:active {
            transform: scale(1.1);
        }

        .side-arrow::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            filter: drop-shadow(0 0 12px cyan) drop-shadow(0 0 25px #0099ff);
            transition: filter 0.2s ease;
        }

        .side-arrow:hover::after {
            filter: drop-shadow(0 0 18px cyan) drop-shadow(0 0 35px #00aaff);
        }

        .left-arrow::after {
            border-width: 30px 40px 30px 0;
            border-color: transparent #00ffff transparent transparent;
        }

        .right-arrow::after {
            border-width: 30px 0 30px 40px;
            border-color: transparent transparent transparent #00ffff;
        }

        /* 图片卡片容器 */
        .card-main {
            background: rgba(12, 22, 38, 0.45);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 18px;
            box-shadow: 
                0 15px 45px rgba(0, 200, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(0, 220, 255, 0.3);
            border: 1px solid rgba(0, 220, 255, 0.3);
            transition: all 0.4s ease;
            flex: 1;
            min-width: 0;
            position: relative;
        }

        .card-main:hover {
            background: rgba(12, 22, 38, 0.6);
            box-shadow: 0 20px 60px rgba(0, 220, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 0 0 1px rgba(0, 220, 255, 0.6);
            transform: translateY(-4px);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.1) 0%, rgba(0, 240, 200, 0.1) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 220, 255, 0.25);
        }

        .screen-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
            filter: brightness(1.02) contrast(1.02);
            background-color: rgba(0, 20, 30, 0.3);
            transition: transform 0.5s ease;
        }
        .screen-img:hover {
            transform: scale(1.01);
        }

        /* ===== 全屏按钮 ===== */
        .fullscreen-btn {
            position: absolute;
            top: 28px;
            right: 28px;
            width: 44px;
            height: 44px;
            background: rgba(0, 20, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(0, 255, 255, 0.6);
            border-radius: 30px;
            color: #00ffff;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 8px rgba(255, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
            line-height: 1;
            padding-bottom: 4px;
        }

        .fullscreen-btn:hover {
            transform: scale(1.15);
            background: rgba(0, 40, 60, 0.9);
            border-color: #ffffff;
            color: white;
            box-shadow: 0 0 30px cyan, 0 0 60px #0099ff;
        }

        .fullscreen-btn:active {
            transform: scale(1.05);
        }

        /* 字幕区域 - 完全保持不变 */
        .subtitle-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .instruction-subtitle {
            font-family: 'Microsoft YaHei', '微软雅黑', 'Space Mono', monospace;
            font-weight: 300;
            font-size: 28px;
            line-height: 1.5;
            color: #d0e4ff;
            background: linear-gradient(135deg, rgba(0, 220, 255, 0.2) 0%, rgba(0, 240, 200, 0.15) 100%);
            backdrop-filter: blur(16px);
            padding: 18px 30px;
            border-radius: 60px;
            text-align: center;
            border: 2px solid rgba(0, 230, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1);
            word-break: break-word;
            position: relative;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .instruction-subtitle:hover {
            border-color: rgba(0, 255, 255, 0.7);
            box-shadow: 0 0 45px rgba(0, 230, 255, 0.5);
            background: linear-gradient(135deg, rgba(0, 230, 255, 0.25) 0%, rgba(0, 250, 210, 0.2) 100%);
            color: white;
        }

        .step-indicator {
            font-family: 'Microsoft YaHei', '微软雅黑', 'Orbitron', sans-serif;
            font-weight: 300;
            font-size: 18px;
            color: #b0ffff;
            background: rgba(0, 20, 30, 0.5);
            backdrop-filter: blur(8px);
            padding: 10px 32px;
            border-radius: 40px;
            border: 1px solid rgba(0, 240, 255, 0.5);
            display: inline-block;
            margin-top: 16px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .side-arrow { width: 70px; height: 140px; }
            .side-arrow::after { border-width: 26px 35px 26px 0; }
            .right-arrow::after { border-width: 26px 0 26px 35px; }
            .instruction-subtitle { font-size: 24px; }
            .fullscreen-btn { width: 40px; height: 40px; font-size: 24px; top: 22px; right: 22px; }
        }
        @media (max-width: 700px) {
            .side-arrow { width: 60px; height: 120px; }
            .side-arrow::after { border-width: 22px 30px 22px 0; }
            .right-arrow::after { border-width: 22px 0 22px 30px; }
            .image-row { gap: 10px; }
            .instruction-subtitle { font-size: 20px; padding: 14px 20px; }
            .fullscreen-btn { width: 36px; height: 36px; font-size: 22px; top: 18px; right: 18px; }
        }
        @media (max-width: 500px) {
            .side-arrow { width: 50px; height: 100px; }
            .side-arrow::after { border-width: 18px 25px 18px 0; }
            .right-arrow::after { border-width: 18px 0 18px 25px; }
            .instruction-subtitle { font-size: 18px; }
            .step-indicator { font-size: 14px; padding: 6px 18px; }
            .fullscreen-btn { width: 32px; height: 32px; font-size: 20px; top: 14px; right: 14px; }
        }

        .image-row { animation: fadeInUp 0.5s ease-out; }
        .subtitle-container { animation: fadeInUp 0.5s ease-out 0.1s backwards; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="header-section">
            <h1 class="platform-title">华文口试</h1>
            <p class="platform-subtitle">PREPARATION PLATFORM</p>
        </div>

        <!-- 图片 + 左右纯三角箭头 -->
        <div class="image-row">
            <!-- 左箭头 -->
            <button class="side-arrow left-arrow" onclick="changeStep(-1)" title="上一步"></button>

            <!-- 图片卡片 (包含全屏按钮) -->
            <div class="card-main" id="cardMain">
                <div class="image-container">
                    <img id="mainImage" src="01.png" alt="考试界面" class="screen-img" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%230a2a3a%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%22150%22%20font-family%3D%22Arial%22%20font-size%3D%2220%22%20fill%3D%22%2399ffff%22%3E%E5%9B%BE%E7%89%87%2001.png%20%E6%9C%AA%E6%89%BE%E5%88%B0%3C%2Ftext%3E%3C%2Fsvg%3E';">
                </div>
                <!-- 全屏小按钮 -->
                <button class="fullscreen-btn" id="fullscreenBtn" title="全屏模式">⛶</button>
            </div>

            <!-- 右箭头 -->
            <button class="side-arrow right-arrow" onclick="changeStep(1)" title="下一步"></button>
        </div>

        <!-- 字幕 + 步骤指示器 -->
        <div class="subtitle-container">
            <div class="instruction-subtitle" id="instructionDisplay">
                点击 START 开始10分钟准备。
            </div>
            <div style="text-align: center;">
                <span class="step-indicator" id="stepIndicator">1/4</span>
            </div>
        </div>
    </div>

    <script>
        const steps = [
            { image: "01.png", instruction: "点击 START 开始10分钟准备。" },
            { image: "02.png", instruction: "右上角倒计时，时间到自动停止。点击观看视频跳转到下一页，10分钟内可以自由切换。" },
            { image: "03.png", instruction: "点击朗读篇章可以切换至朗读页面。" },
            { image: "04.png", instruction: "时间一到，摘下耳机，面向考官方向等待指令。下一个考生请点击 RESET TIMER。" }
        ];

        let currentStep = 0;
        const mainImage = document.getElementById('mainImage');
        const instructionDisplay = document.getElementById('instructionDisplay');
        const stepIndicator = document.getElementById('stepIndicator');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const mainContainer = document.getElementById('mainContainer');

        function updateStep() {
            const step = steps[currentStep];
            mainImage.src = step.image;
            instructionDisplay.innerText = step.instruction;
            stepIndicator.innerText = (currentStep + 1) + '/4';
        }

        function changeStep(direction) {
            currentStep += direction;
            if (currentStep < 0) currentStep = steps.length - 1;
            if (currentStep >= steps.length) currentStep = 0;
            updateStep();
        }

        // ===== 最可靠的全屏隐藏逻辑 =====
        function updateFullscreenButtonVisibility() {
            // 如果处于全屏模式，直接隐藏按钮；否则显示
            if (document.fullscreenElement || 
                document.webkitFullscreenElement || 
                document.msFullscreenElement) {
                fullscreenBtn.style.display = 'none';
            } else {
                fullscreenBtn.style.display = 'flex';
            }
        }

        // 全屏切换函数
        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                // 进入全屏
                if (mainContainer.requestFullscreen) {
                    mainContainer.requestFullscreen();
                } else if (mainContainer.webkitRequestFullscreen) {
                    mainContainer.webkitRequestFullscreen();
                } else if (mainContainer.msRequestFullscreen) {
                    mainContainer.msRequestFullscreen();
                }
                // 立即隐藏按钮 (对于不支持fullscreenchange事件的浏览器做保障)
                fullscreenBtn.style.display = 'none';
            } else {
                // 退出全屏
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                // 注意：不在这里立即显示，因为fullscreenchange事件会处理
            }
        }

        // 监听各种全屏变化事件
        document.addEventListener('fullscreenchange', updateFullscreenButtonVisibility);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButtonVisibility);
        document.addEventListener('msfullscreenchange', updateFullscreenButtonVisibility);
        
        // 额外监听fullscreenerror，以及窗口失焦等情况 (但全屏变化已经足够)
        // 初始化时确保按钮可见
        updateFullscreenButtonVisibility();

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeStep(-1);
            if (e.key === 'ArrowRight') changeStep(1);
        });

        updateStep();
    </script>
</body>
</html>
